    工作经历:
      - company: Nexus AI
        position: 联合创始人兼首席技术官
        date:
        start_date: 2023-06
        end_date: present
        location: 旧金山，加利福尼亚州
        summary:
        highlights:
          - 构建基础模型基础设施，月均处理超过 200 万次 API 请求，正常运行时间达 99.97%
          - 完成 1800 万美元 A 轮融资，由红杉资本领投，a16z 和 Founders Fund 跟投
          - 将工程团队从 3 人扩展至 28 人，涵盖机器学习研究、平台和应用 AI 三个方向
          - 开发专有推理优化方案，相比基准延迟降低 73%
      - company: NVIDIA 研究院
        position: 研究实习生
        date:
        start_date: 2022-05
        end_date: 2022-08
        location: 圣克拉拉，加利福尼亚州
        summary:
        highlights:
          - 设计稀疏注意力机制，将 Transformer 内存占用降低至原来的 1/4.2
          - 合著论文被 NeurIPS 2022 接收（亮点报告，投稿前 5%）
      - company: Google DeepMind
        position: 研究实习生
        date:
        start_date: 2021-05
        end_date: 2021-08
        location: 伦敦，英国
        summary:
        highlights:
          - 开发多智能体协作的强化学习算法
          - 在顶级学术会议发表重要影响力的研究成果
            - ICML 2022 主会议论文，两年内被引用 340+ 次
            - NeurIPS 2022 研讨会论文，关于涌现通信协议
            - JMLR (2023) 邀请扩展论文
      - company: Apple 机器学习研究院
        position: 研究实习生
        date:
        start_date: 2020-05
        end_date: 2020-08
        location: 库比蒂诺，加利福尼亚州
        summary:
        highlights:
          - 创建端侧神经网络压缩流水线，部署于超过 5000 万台设备
          - 申请 2 项关于高效模型量化技术的专利
      - company: 微软研究院
        position: 研究实习生
        date:
        start_date: 2019-05
        end_date: 2019-08
        location: 雷德蒙德，华盛顿州
