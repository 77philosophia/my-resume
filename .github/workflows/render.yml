name: Render Double Resume

on:
  push:
    branches:
      - master

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render Chinese CV
        run: rendercv render wangxin_ch.yaml_CV.yaml

      - name: Render English CV
        run: rendercv render wangxin_en.yaml_CV.yaml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output  # RenderCV 会将所有渲染结果都放在这个目录下
          force_orphan: true
